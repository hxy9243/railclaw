name: Build Image

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: |
          docker build \
            --pull \
            --build-arg OPENCLAW_INSTALL_BROWSER=0 \
            --build-arg INSTALL_PLAYWRIGHT_BROWSERS=0 \
            -t openclaw-railway:${{ github.sha }} .
      - name: Inspect build manifest
        run: |
          docker run --rm --entrypoint node openclaw-railway:${{ github.sha }} \
            -e "const m=require('/opt/openclaw-manifests/build-manifest.json'); if (!m.openclawPackage || !m.versions.openclaw) process.exit(1); console.log(m)"
