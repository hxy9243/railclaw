name: Weekly Upgrade Check

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Check OpenClaw package
        run: node tools/upgrades/check-openclaw-package.js --write
      - name: Report npm updates
        run: |
          npm outdated || true
          npm outdated --prefix extensions || true
      - name: Build minimal image
        run: |
          docker build \
            --pull \
            --build-arg OPENCLAW_INSTALL_BROWSER=0 \
            --build-arg INSTALL_PLAYWRIGHT_BROWSERS=0 \
            -t openclaw-railway:weekly-upgrade-check .
      - name: Check runtime tools
        run: |
          docker run --rm --entrypoint node openclaw-railway:weekly-upgrade-check \
            -e "const m=require('/opt/openclaw-manifests/build-manifest.json'); if (!m.versions.openclaw) process.exit(1); console.log(m.versions)"
      - name: Create OpenClaw update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            Dockerfile
            docker-compose.yml
          branch: automated/openclaw-version
          delete-branch: true
          commit-message: "chore: update OpenClaw version"
          title: "chore: update OpenClaw version"
          body: |
            Updates the pinned OpenClaw npm version to the latest published release.

            The workflow built the image and checked its runtime manifest before opening this PR.
