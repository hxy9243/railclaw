services:
  openclaw:
    build:
      context: .
      args:
        OPENCLAW_IMAGE: ${OPENCLAW_IMAGE:-alpine/openclaw:latest}
        OPENCLAW_IMAGE_APT_PACKAGES: ${OPENCLAW_IMAGE_APT_PACKAGES:-}
        OPENCLAW_IMAGE_PIP_PACKAGES: ${OPENCLAW_IMAGE_PIP_PACKAGES:-}
        OPENCLAW_INSTALL_BROWSER: ${OPENCLAW_INSTALL_BROWSER:-1}
        EXTRA_APT_PACKAGES: ${EXTRA_APT_PACKAGES:-}
        EXTRA_NPM_PACKAGES: ${EXTRA_NPM_PACKAGES:-@openai/codex @anthropic-ai/claude-code @google/gemini-cli obsidian-cli playwright}
        EXTRA_PIP_PACKAGES: ${EXTRA_PIP_PACKAGES:-}
        INSTALL_PLAYWRIGHT_BROWSERS: ${INSTALL_PLAYWRIGHT_BROWSERS:-${OPENCLAW_INSTALL_BROWSER:-1}}
    env_file:
      - path: .env
        required: false
    environment:
      PORT: ${PORT:-8080}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-8080}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_DISABLE_BONJOUR: ${OPENCLAW_DISABLE_BONJOUR:-1}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      OPENCLAW_TZ: ${OPENCLAW_TZ:-UTC}
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-8080}:${OPENCLAW_GATEWAY_PORT:-8080}"
    volumes:
      - openclaw_data:/data
    restart: unless-stopped

volumes:
  openclaw_data:
