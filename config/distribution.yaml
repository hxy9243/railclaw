openclaw:
  package: openclaw@latest

profile: developer

runtime:
  dataDir: /data
  stateDir: /data/.openclaw
  distributionDir: /data/.openclaw-distribution
  workspaceDir: /data/workspace
  gatewayPort: 8080

extensions:
  apt: extensions/apt.txt
  npmPackage: extensions/package.json
  npmLock: extensions/package-lock.json
  pythonInput: extensions/requirements.in
  pythonRequirements: extensions/requirements.txt
  browsers: extensions/browsers.yaml
  skills: extensions/skills.yaml
